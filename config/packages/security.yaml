# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 1. ADDED: This defines the power structure
    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            
            # Use the NAMED ROUTE for the entry point
            entry_point: App\Security\AppAuthenticator

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # 2. UPDATED: Activating the gates
    access_control:
        # Only ROLE_SUPER_ADMIN can enter the superadmin territory
        - { path: ^/superadmin, roles: ROLE_SUPER_ADMIN }
        
        # Any logged in user (ROLE_USER or higher) can see the dashboard
        - { path: ^/admin, roles: ROLE_ADMIN }